<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Calibrar 2.png</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a1a;color:#fff;font-family:monospace;overflow:auto;}
#wrap{position:relative;display:inline-block;}
#img{display:block;width:960px;height:auto;}
#overlay{position:absolute;inset:0;cursor:crosshair;}
.dot{position:absolute;transform:translate(-50%,-50%);width:14px;height:14px;
  border-radius:50%;background:rgba(255,60,60,0.9);border:2px solid #fff;pointer-events:none;z-index:10;}
.lbl2{position:absolute;transform:translate(8px,-50%);background:rgba(0,0,0,0.9);
  border:1px solid #ff4444;padding:1px 5px;font-size:10px;pointer-events:none;z-index:11;white-space:nowrap;}
#log{position:fixed;top:0;right:0;width:280px;height:100vh;overflow-y:auto;
  background:#0a0818;border-left:1px solid #333;padding:10px;font-size:11px;}
#log h3{color:#fff;margin-bottom:6px;}
.e{margin:1px 0;color:#22C55E;}
#out{width:100%;height:220px;background:#080614;color:#22C55E;border:1px solid #333;
  font-size:10px;padding:4px;resize:none;margin-top:8px;}
#coords{position:fixed;bottom:0;left:0;width:calc(100% - 280px);
  background:#100F22;border-top:1px solid #333;padding:6px 12px;font-size:12px;color:#A78BFA;}
button{background:#7C3AED;color:#fff;border:none;padding:4px 10px;
  cursor:pointer;border-radius:4px;margin:3px 2px;font-size:11px;}
</style>
</head>
<body>
<div id="wrap">
  <img id="img" src="2.png">
  <div id="overlay"></div>
</div>
<div id="log">
  <h3>📍 Cliques</h3>
  <p style="color:#4B4570;font-size:9px;margin-bottom:6px">Clique sobre cada botão físico</p>
  <div id="entries"></div>
  <textarea id="out" placeholder="Coords..."></textarea>
  <button onclick="clearAll()">Limpar</button>
  <button onclick="navigator.clipboard.writeText(document.getElementById('out').value)">Copiar</button>
</div>
<div id="coords">Mova o mouse para ver coordenadas</div>
<script>
const ov=document.getElementById('overlay'),img=document.getElementById('img');
const entries=document.getElementById('entries'),out=document.getElementById('out');
let clicks=[];
function pct(e){
  const r=img.getBoundingClientRect();
  return{x:((e.clientX-r.left)/r.width*100).toFixed(2),
         y:((e.clientY-r.top)/r.height*100).toFixed(2)};
}
ov.addEventListener('mousemove',e=>{
  const{x,y}=pct(e);
  document.getElementById('coords').textContent=`X:${x}%  Y:${y}%  (clique para marcar #${clicks.length+1})`;
});
ov.addEventListener('click',e=>{
  const{x,y}=pct(e);
  const n=clicks.length+1;
  const dot=document.createElement('div');dot.className='dot';dot.style.cssText=`left:${x}%;top:${y}%;`;
  ov.appendChild(dot);
  const lbl=document.createElement('div');lbl.className='lbl2';lbl.style.cssText=`left:${x}%;top:${y}%;`;
  lbl.textContent=`#${n}`;ov.appendChild(lbl);
  clicks.push({n,x,y});
  const d=document.createElement('div');d.className='e';d.textContent=`#${n}: ${x}%, ${y}%`;
  entries.appendChild(d);entries.scrollTop=entries.scrollHeight;
  out.value=clicks.map(c=>`#${c.n}: left:${c.x}%, top:${c.y}%`).join('\n');
});
function clearAll(){
  clicks=[];ov.querySelectorAll('.dot,.lbl2').forEach(e=>e.remove());
  entries.innerHTML='';out.value='';
}
</script>
</body>
</html>
